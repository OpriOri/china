name: controlix

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/opriori/controlix-backend}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: db
      TRUST_PROXY_HEADERS: "true"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/opriori/controlix-frontend}:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
