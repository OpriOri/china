name: CI and Deploy

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/opriori/robbo-china-backend
  FRONTEND_IMAGE: ghcr.io/opriori/robbo-china-frontend

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image-tag
        run: echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.image-tag.outputs.value }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.image-tag.outputs.value }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: docker-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}/backend"

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"

            IMAGE_TAG="$(printf '%s' '${{ github.sha }}' | cut -c 1-12)"

            mkdir -p backend

            cat > backend/.env <<'EOF'
            ${{ secrets.BACKEND_ENV }}
            EOF

            cat > .env <<EOF
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
            IMAGE_TAG=$IMAGE_TAG
            BACKEND_PORT=8000
            FRONTEND_PORT=3000
            EOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans

            echo "Waiting for backend health..."
            timeout 90 sh -c 'until curl -fsS http://127.0.0.1:8000/health >/dev/null; do sleep 3; done'

            echo "Checking frontend..."
            timeout 60 sh -c 'until curl -fsS http://127.0.0.1:3000 >/dev/null; do sleep 3; done'

            docker image prune -af --filter "until=24h"

            docker compose ps